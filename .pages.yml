content:
  - name: sonderzeiten
    label: "Außergewöhnliche Öffnungszeiten"
    type: file
    path: "zeiten.json"
    format: json
    fields:
      - name: zeiten
        label: "Öffnungszeiten Liste"
        type: list
        # Hier ist der wichtige Teil für die Felder pro Zeile:
        fields:
          - name: datum
            label: "Datum"
            type: string
          - name: status
            label: "Status"
            type: string
          - name: grund
            label: "Grund"
            type: string