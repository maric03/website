content:
  - name: sonderzeiten
    label: "Außergewöhnliche Öffnungszeiten"
    type: collection
    # Hier ist der entscheidende Teil: Pfad vom Hauptverzeichnis aus
    path: "oeffnungszeiten/oeffnungszeiten.json"  
    format: json
    fields:
      - name: datum
        label: "Datum / Zeitraum"
        type: string
      - name: status
        label: "Status (z.B. Geschlossen oder Uhrzeit)"
        type: string
      - name: grund
        label: "Anmerkung (optional)"
        type: string
