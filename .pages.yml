content:
  - name: sonderzeiten
    label: "Außergewöhnliche Öffnungszeiten"
    type: file
    path: "zeiten.json"
    format: json
    fields:
      - name: zeiten
        label: "Öffnungszeiten Liste"
        type: list
        # Das hier erzwingt die Darstellung der Unterfelder:
        object: true
        fields:
          - name: datum
            label: "Datum"
            type: string
          - name: status
            label: "Status"
            type: string
          - name: grund
            label: "Grund"
          - type: string