content:
  - name: sonderzeiten
    label: "Außergewöhnliche Öffnungszeiten"
    type: file
    path: "zeiten.json"
    format: json
    fields:
      - name: zeiten
        label: "Öffnungszeiten Liste"
        type: list
        # Hier sagen wir dem CMS, was es als Vorschau anzeigen soll
        item_label: "{{datum}}"
        fields:
          - name: datum
            label: "Datum"
            type: string
          - name: status
            label: "Status"
            type: string
          - name: grund
            label: "Grund"
            type: string