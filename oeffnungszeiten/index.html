<!DOCTYPE html>
<html lang="de">
<head>
   <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Öffnungszeiten - Fabelhafte Funde</title>
  <link rel="icon" type="image/png" href="/logo.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="/style.css" />
</head>
<body style="font-family: 'Segoe UI', Arial, sans-serif; background-color: #f2e8e4; color: #5a4a42; margin: 0; padding: 0;">

     <div class="top-strip"></div>

  <header class="site-header">
    <div class="container header-inner">
      <a href="#top" class="logo-link">
        <img src="/logo.jpg" alt="Fabelhafte Funde Logo" class="logo" />
      </a>

      <nav class="main-nav">
        <a href="/">Startseite</a>
        <a href="/oeffnungszeiten/">Öffnungszeiten</a>
        <a href="/galerie.html">Galerie</a>
        <a href="/kontakt.html">Kontakt</a>
      </nav>
    </div>
    <div class="header-scallop"></div>
  </header>

    <main style="max-width: 800px; margin: 0 auto; padding: 0 20px 60px 20px;">
        
        <section style="text-align: center; margin-bottom: 60px;">
            <h2 style="font-family: 'Georgia', serif; color: #8c6473; font-size: 2rem; font-weight: normal; margin-bottom: 25px;">Das erwartet dich</h2>
            <div style="background: #ffffff; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.03);">
                <p style="font-size: 1.2rem; margin: 10px 0;"><strong>Jeden Samstag</strong></p>
                <p style="font-size: 1.1rem; color: #8c6473;">11:00 – 16:00 Uhr</p>
            </div>
        </section>

        <section>
            <div style="text-align: center; margin-bottom: 30px;">
                 <h2 style="font-family: 'Georgia', serif; color: #8c6473; font-size: 2rem; font-weight: normal; margin-bottom: 10px;">Termine & Urlaub</h2>
                 <p style="font-size: 0.9rem; color: #a68b8b; font-style: italic;">Aktuelle Infos zu Betriebsferien oder gesonderten Tagen</p>
            </div>

            <div style="background: #ffffff; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.03);">
                <table style="width: 100%; border-collapse: collapse; text-align: left;">
                    <thead>
                        <tr style="border-bottom: 1px solid #f2e8e4;">
                            <th style="padding: 20px; color: #8c6473; font-weight: 600; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px;">Datum</th>
                            <th style="padding: 20px; color: #8c6473; font-weight: 600; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px;">Status</th>
                            <th style="padding: 20px; color: #8c6473; font-weight: 600; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px;">Anmerkung</th>
                        </tr>
                    </thead>
                    <tbody id="oeffnungszeiten-body">
                        </tbody>
                </table>
            </div>
        </section>

    </main>

    <footer style="text-align: center; padding: 40px; background-color: #b08494; color: #ffffff; margin-top: 40px;">
        <p style="margin-bottom: 10px;">Bruchsaler Straße 9a, 76698 Ubstadt-Weiher</p>
        <a href="index.html" style="color: #ffffff; text-decoration: underline; font-size: 0.9rem;">Zurück zur Startseite</a>
    </footer>

  <script>
  // DEINE DATEN - BITTE PRÜFEN:
  const username = "maric03"; 
  const repo = "website"; // Falls dein Repo anders heißt, hier ändern
  const folder = "oeffnungszeiten_daten";

  async function ladeZeiten() {
    const tbody = document.getElementById('oeffnungszeiten-body');
    if (!tbody) return;

    try {
      // 1. Liste der Dateien im Ordner abrufen
      const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/${folder}`);
      const files = await response.json();

      tbody.innerHTML = ''; // Tabelle leeren

      // 2. Jede Datei durchgehen
      for (const file of files) {
        if (file.name.endsWith('.md')) {
          const fileRes = await fetch(file.download_url);
          const text = await fileRes.json(); // Pages CMS speichert JSON oft IN der MD-Datei
          
          // Wir bauen die Zeile für die Tabelle
          const row = `
            <tr>
              <td style="padding: 10px; border: 1px solid #ddd;">${text.datum || '-'}</td>
              <td style="padding: 10px; border: 1px solid #ddd;">${text.status || '-'}</td>
              <td style="padding: 10px; border: 1px solid #ddd;">${text.grund || '-'}</td>
            </tr>`;
          tbody.innerHTML += row;
        }
      }
    } catch (err) {
      console.error("Fehler beim Laden:", err);
      tbody.innerHTML = '<tr><td colspan="3">Keine Termine gefunden.</td></tr>';
    }
  }
  ladeZeiten();
</script>
</body>
</html>
