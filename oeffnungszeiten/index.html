<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fabelhafte Funde</title>
  <link rel="icon" type="/image/png" href="/logo.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="top-strip"></div>

  <header class="site-header">
    <div class="container header-inner">
      <a href="#top" class="logo-link">
        <img src="/logo.jpg" alt="Fabelhafte Funde Logo" class="logo" />
      </a>

      <nav class="main-nav">
        <a href="/">Startseite</a>
        <a href="#ueber">Über uns</a>
        <a href="#sortiment">Sortiment</a>
        <a href="/oeffnungszeiten/">Öffnungszeiten</a>
        <a href="#galerie">Galerie</a>
        <a href="#kontakt">Kontakt</a>
      </nav>
    </div>
    <div class="header-scallop"></div>
  </header>

  <main id="top">
    <section class="hours-section" id="zeiten">
      <div class="container hours-grid">
        <div class="hours-text">
          <h2>Öffnungszeiten</h2>
          <p class="hours-day">Jeden Samstag</p>
          <p class="hours-time">11:00 – 16:00 Uhr</p>
          <!-- Die Tabelle, die gefüllt wird -->
<div id="zeiten-container">
<h3>Aktuelle Sonderöffnungszeiten</h3>
<table border="1" style="width:100%; border-collapse: collapse;">
<thead>
<tr style="background:#eee;">
<th>Datum</th>
<th>Status</th>
<th>Grund/Info</th>
</tr>
</thead>
<tbody id="oeffnungszeiten-body">
<!-- Hier erscheinen die Daten -->
</tbody>
</table>
</div>

<script>
// Script zum Laden der JSON-Datei
fetch('oeffnungszeiten.json')
.then(response => response.json())
.then(data => {
const tbody = document.getElementById('oeffnungszeiten-body');
tbody.innerHTML = ''; // Platzhalter leeren
data.forEach(item => {
const row = `<tr>
<td>${item.datum}</td>
<td>${item.status}</td>
<td>${item.grund || '-'}</td>
</tr>`;
tbody.innerHTML += row;
});
})
.catch(err => {
console.error("Fehler beim Laden der Zeiten:", err);
document.getElementById('zeiten-container').style.display =
'none';
});
</script>
          <p class="hours-address" id="kontakt">
            Bruchsaler Straße 9a<br>
            76698 Ubstadt-Weiher
          </p>
        </div>

        <div class="map-card">
          <iframe
            title="Karte Fabelhafte Funde"
            src="https://www.google.com/maps?q=Bruchsaler%20Stra%C3%9Fe%209a,%2076698%20Ubstadt-Weiher&output=embed"
            loading="lazy"
            referrerpolicy="no-referrer-when-downgrade">
          </iframe>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
